<!--
7b. Build a servlet program to find the factorial of a number using HTML
with step by step procedure.

Steps:
1. Create Dynamic Web Project
2. Create Servlet
3. Create HTML form
4. Run on Tomcat server
-->

<!DOCTYPE html>
<html>
<head>
    <title>Factorial Calculator</title>
</head>
<body>
    <h2>Factorial Calculator</h2>

    <form action="factorial" method="post">
        Enter a number:
        <input type="number" name="number" min="0" max="20" required>
        <br><br>
        <input type="submit" value="Calculate Factorial">
    </form>

</body>
</html>
